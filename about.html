<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Josie — About</title>
  <meta name="description" content="About Josie.">
  <link rel="icon" href="assets/img/logo/josie-icon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="about">
  <header id="sidebar" class="sidebar"></header>
  <main class="main">
    <div class="about">
      <div class="page-head">
        <h1 class="page-title">About</h1>
        <hr class="page-rule">
      </div>
      <div class="about__body" id="aboutBody"></div>
    </div>
  </main>
  <script>
  /* Load CONTENT fresh each visit (beats GitHub Pages' ~10-min cache so edits show
     right away); then build the sidebar and render the About text. */
  (function () {
    function add(src, then) {
      var s = document.createElement('script');
      s.src = src; if (then) { s.onload = s.onerror = then; }
      document.body.appendChild(s);
    }
    add('assets/js/data.js?v=' + Date.now(), function () {
      add('assets/js/ui.js');
      var S = window.SITE || {};
      var b = document.getElementById('aboutBody');
      if (b) (S.about || '').split('\n\n').forEach(function (p) {
        var el = document.createElement('p'); el.textContent = p; b.appendChild(el);
      });
    });
  })();
  </script>
</body>
</html>
