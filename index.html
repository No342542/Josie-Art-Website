<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Josie — Gallery</title>
  <meta name="description" content="Artwork by Josie — sketches, full pieces and speed-paints in Procreate.">
  <link rel="icon" href="assets/img/logo/josie-icon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="gallery">
  <header id="sidebar" class="sidebar"></header>
  <main class="main">
    <div class="page-head">
      <h1 class="page-title" id="pageTitle">Gallery</h1>
      <hr class="page-rule">
    </div>
    <nav class="filters" id="filters" aria-label="Categories"></nav>
    <div class="grid" id="grid"></div>
  </main>
  <script>
  /* Load gallery CONTENT fresh on every visit. GitHub Pages caches files for ~10 min
     (max-age=600), which would otherwise delay a newly published photo from showing
     across browsers/devices/CDN edges. A per-load ?v= on data.js sidesteps that cache;
     the code files (ui/gallery) load right after and may stay cached (they change rarely). */
  (function () {
    function add(src, then) {
      var s = document.createElement('script');
      s.src = src; if (then) { s.onload = s.onerror = then; }
      document.body.appendChild(s);
    }
    add('assets/js/data.js?v=' + Date.now(), function () {
      add('assets/js/ui.js'); add('assets/js/gallery.js');
    });
  })();
  </script>
</body>
</html>
